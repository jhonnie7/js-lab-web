<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="IMG-20260616-WA0035.jpg">
<meta name="theme-color" content="#050a0e">
<meta name="description" content="JS-LAB — Live homelab status dashboard. Service uptime, infrastructure stats, security posture.">
<meta property="og:title" content="JS-LAB | Live Status" />
<meta property="og:description" content="Live homelab status dashboard by Jonathan Samuel." />
<meta property="og:image" content="https://js-lab.uk/js-lab-logo-round.png" />
<meta property="og:url" content="https://js-lab.uk/status.html" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan: #00e5ff;
  --cyan-dim: rgba(0, 229, 255, 0.12);
  --cyan-glow: rgba(0, 229, 255, 0.4);
  --cyan-border: rgba(0, 229, 255, 0.2);
  --dark: #050a0e;
  --dark2: #0a1520;
  --steel: #8ca0b0;
  --white: #e8f4f8;
  --green: #00ff88;
  --red: #ff5f57;
}
html { scroll-behavior: smooth; }
html, body { background: var(--dark); color: var(--white); font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; animation: gridShift 20s linear infinite; pointer-events: none; }
@keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }
.status-bar { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 2rem; border-bottom: 1px solid rgba(0,229,255,0.1); background: rgba(5,10,14,0.85); backdrop-filter: blur(10px); font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--steel); z-index: 100; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); display: inline-block; margin-right: 0.4rem; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--cyan); } 50% { opacity: 0.4; box-shadow: none; } }
.status-bar a { color: var(--steel); text-decoration: none; letter-spacing: 0.1em; }
.status-bar a:hover { color: var(--cyan); }
main { position: relative; z-index: 1; padding: 7rem 2rem 4rem; max-width: 860px; margin: 0 auto; }
.page-title { text-align: center; margin-bottom: 3rem; }
.page-title h1 { font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 700; letter-spacing: 0.25em; color: var(--white); text-shadow: 0 0 30px var(--cyan-glow); }
.page-title h1 span { color: var(--cyan); }
.page-title p { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--steel); margin-top: 0.6rem; }
section { position: relative; z-index: 1; margin-bottom: 3rem; }
.section-label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--cyan); letter-spacing: 0.3em; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.75rem; }
.section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--cyan-border), transparent); }
.svc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 0.75rem; }
.svc-card { border: 1px solid var(--cyan-border); background: var(--cyan-dim); padding: 1rem 1.1rem; border-radius: 3px; transition: all 0.25s; }
.svc-card.offline { border-color: rgba(255,95,87,0.3); background: rgba(255,95,87,0.06); }
.svc-name { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--white); letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.svc-state { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.4rem; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot.up { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.down { background: var(--red); box-shadow: 0 0 6px var(--red); }
.state-up { color: var(--green); }
.state-down { color: var(--red); }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem; }
.stat-card { border: 1px solid var(--cyan-border); background: var(--cyan-dim); padding: 1rem 1.1rem; border-radius: 3px; text-align: center; }
.stat-val { font-family: 'Share Tech Mono', monospace; font-size: 1.5rem; color: var(--cyan); font-weight: 700; }
.stat-label { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--steel); letter-spacing: 0.1em; margin-top: 0.3rem; }
.terminal { background: var(--dark2); border: 1px solid var(--cyan-border); border-radius: 6px; overflow: hidden; box-shadow: 0 0 40px rgba(0,229,255,0.05); }
.terminal-bar { background: rgba(0,229,255,0.06); padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--cyan-border); }
.t-dot { width: 10px; height: 10px; border-radius: 50%; }
.t-dot.r { background: #ff5f57; } .t-dot.y { background: #febc2e; } .t-dot.g { background: #28c840; }
.terminal-title { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--steel); margin-left: auto; margin-right: auto; letter-spacing: 0.1em; }
.terminal-body { padding: 1.2rem 1.5rem; font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; line-height: 1.8; }
.t-out { color: var(--steel); display: block; }
.t-key { color: var(--cyan); }
.t-val { color: var(--green); }
.note { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: rgba(140,160,176,0.6); letter-spacing: 0.05em; margin-top: 1rem; text-align: center; }
footer { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; border-top: 1px solid rgba(0,229,255,0.1); background: rgba(5,10,14,0.8); backdrop-filter: blur(10px); font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: rgba(140,160,176,0.5); letter-spacing: 0.1em; }
@media (max-width: 480px) { .status-bar { font-size: 0.6rem; padding: 0.6rem 1rem; } .svc-grid, .stat-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="status-bar">
  <div><span class="status-dot"></span>JS-LAB.UK</div>
  <div><a href="index.html">&larr; HOME</a></div>
</div>
<main>
  <div class="page-title">
    <h1>LIVE<span> </span>STATUS</h1>
    <p>HOMELAB INFRASTRUCTURE · REFRESHED HOURLY</p>
  </div>

  <section>
    <div class="section-label">// SERVICES</div>
    <div class="svc-grid" id="services-grid">
      <div class="svc-card"><div class="svc-name">HYPERVISOR</div><div class="svc-state"><span class="dot up"></span><span class="state-up">LOADING</span></div></div>
    </div>
  </section>

  <section>
    <div class="section-label">// INFRASTRUCTURE</div>
    <div class="stat-grid" id="stats-grid"></div>
  </section>

  <section>
    <div class="section-label">// SECURITY POSTURE</div>
    <div class="terminal">
      <div class="terminal-bar">
        <div class="t-dot r"></div><div class="t-dot y"></div><div class="t-dot g"></div>
        <div class="terminal-title">jon@js-lab.uk ~ security --status</div>
      </div>
      <div class="terminal-body" id="security-body">
        <span class="t-out">loading...</span>
      </div>
    </div>
    <p class="note" id="updated-note">Last updated: —</p>
  </section>
</main>
<footer>© 2026 JS-LAB · JONATHAN SAMUEL · js-lab.uk</footer>

<script>
async function loadStatus() {
  const servicesGrid = document.getElementById('services-grid');
  const statsGrid = document.getElementById('stats-grid');
  const secBody = document.getElementById('security-body');
  const updatedNote = document.getElementById('updated-note');

  try {
    const res = await fetch('status.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('status.json unavailable');
    const data = await res.json();

    const svcLabels = {
      hypervisor: 'HYPERVISOR',
      media_server: 'MEDIA SERVER',
      vpn: 'VPN',
      security: 'IPS / FIREWALL'
    };

    servicesGrid.innerHTML = Object.entries(data.services || {}).map(([key, val]) => {
      const up = val === 'online';
      return `<div class="svc-card ${up ? '' : 'offline'}">
        <div class="svc-name">${svcLabels[key] || key.toUpperCase()}</div>
        <div class="svc-state">
          <span class="dot ${up ? 'up' : 'down'}"></span>
          <span class="${up ? 'state-up' : 'state-down'}">${up ? 'ONLINE' : 'OFFLINE'}</span>
        </div>
      </div>`;
    }).join('');

    const stats = data.stats || {};
    const statItems = [
      { val: stats.containers_running ?? '—', label: 'CONTAINERS RUNNING' },
      { val: stats.uptime_days ?? '—', label: 'UPTIME (DAYS)' },
      { val: stats.wireguard_peers_connected ?? '—', label: 'VPN PEERS ONLINE' },
      { val: stats.active_streams ?? '—', label: 'ACTIVE STREAMS' },
    ];
    statsGrid.innerHTML = statItems.map(s =>
      `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`
    ).join('');

    const sec = data.security || {};
    secBody.innerHTML = `
      <span class="t-out"><span class="t-key">active_jails</span>      : <span class="t-val">${sec.active_jails ?? '—'}</span></span>
      <span class="t-out"><span class="t-key">currently_banned</span>  : <span class="t-val">${sec.currently_banned ?? '—'}</span></span>
      <span class="t-out"><span class="t-key">waf_status</span>        : <span class="t-val">${(sec.waf_status || '—').toUpperCase()}</span></span>
    `;

    if (data.updated) {
      const d = new Date(data.updated);
      updatedNote.textContent = `Last updated: ${d.toLocaleString()}`;
    }
  } catch (err) {
    servicesGrid.innerHTML = `<div class="svc-card offline"><div class="svc-name">STATUS UNAVAILABLE</div><div class="svc-state"><span class="dot down"></span><span class="state-down">CHECK BACK SOON</span></div></div>`;
    statsGrid.innerHTML = '';
    secBody.innerHTML = `<span class="t-out">status feed temporarily unavailable.</span>`;
  }
}
loadStatus();
</script>
</body>
</html>
